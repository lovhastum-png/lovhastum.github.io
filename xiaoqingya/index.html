<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>肖清雅的应援小站</title>
<style>
*,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'PingFang SC', 'Noto Sans SC', sans-serif; }

.landing-bg {
  position: fixed; inset: 0; z-index: 0;
  background: url("zhuye.png") center/cover no-repeat;
  transition: transform 1s cubic-bezier(.25,.46,.45,.94);
}
.landing-bg.zoom-out { transform: scale(1.15); }

.landing-sparkles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.ls {
  position: absolute; width: 3px; height: 3px; border-radius: 50%;
  background: #fff; opacity: 0;
  animation: twinkle var(--dur,3s) ease-in-out var(--del,0s) infinite;
}
@keyframes twinkle {
  0%,100% { opacity: 0; transform: scale(.5); }
  50% { opacity: .6; transform: scale(1.2); }
}

.petal-container { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.petal {
  position: absolute;
  border-radius: 50% 0 50% 0;
  animation: petalFall var(--dur,8s) linear var(--del,0s) infinite;
  will-change: transform;
}
@keyframes petalFall {
  0%   { transform: translateY(0) translateX(0) rotate(0deg); opacity: 0; }
  6%   { opacity: 0.65; }
  25%  { transform: translateY(25vh) translateX(180px) rotate(50deg) scale(1); }
  50%  { transform: translateY(50vh) translateX(380px) rotate(160deg) scale(0.95); }
  75%  { transform: translateY(75vh) translateX(580px) rotate(260deg) scale(0.88); }
  94%  { opacity: 0.65; }
  100% { transform: translateY(110vh) translateX(750px) rotate(380deg) scale(0.8); opacity: 0; }
}

.transition-overlay {
  position: fixed; inset: 0; z-index: 20000;
  pointer-events: none; overflow: hidden;
  background: transparent;
  opacity: 0;
  transition: opacity .1s;
}
.transition-overlay.active { opacity: 1; }
.trans-petal {
  position: absolute;
  border-radius: 50% 0 50% 0;
  will-change: transform;
}
.trans-petal.animate {
  animation: transPetalFly var(--tdur,1.2s) cubic-bezier(.25,.46,.45,.94) var(--tdel,0s) forwards;
}
@keyframes transPetalFly {
  0% {
    transform: translate(0, 0) rotate(0deg) scale(.3);
    opacity: 0;
  }
  15% { opacity: .85; }
  100% {
    transform: translate(var(--tx,200px), var(--ty,150px)) rotate(var(--trot,360deg)) scale(var(--tscale,2.5));
    opacity: 1;
  }
}

.star-transition-layer {
  position: fixed; inset: 0; z-index: 1000;
  pointer-events: none; overflow: hidden;
  display: none;
}
.star-transition-layer.active { display: block; }

.black-circle {
  position: absolute; left: 50%; top: 50%;
  width: 20px; height: 20px; border-radius: 50%;
  background: #000;
  transform: translate(-50%,-50%) scale(0); z-index: 2;
}
.black-circle.expand {
  animation: blackExpand 1s cubic-bezier(.25,.46,.45,.94) forwards;
}
@keyframes blackExpand {
  to { transform: translate(-50%,-50%) scale(150); }
}

.landing-content.fade-out { animation: contentFadeOut .8s ease-out forwards; }
@keyframes contentFadeOut {
  0% { opacity: 1; transform: translateY(0); }
  60% { opacity: .3; transform: translateY(-10px); }
  100% { opacity: 0; transform: translateY(-20px); }
}
.landing-footer.fade-out { animation: footerFadeOut .5s ease-out forwards; }
@keyframes footerFadeOut { to { opacity: 0; } }

.star-field { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }
.star-dot {
  position: absolute; border-radius: 50%; background: #fff; opacity: 0;
  will-change: opacity;
}
.star-dot.appear { animation: starAppear var(--sDur,.5s) ease-out var(--sDel,0s) forwards; }
@keyframes starAppear { to { opacity: var(--sOpac,.7); } }

.star-field.shrink { animation: starFieldShrink 1s cubic-bezier(.6,.04,.98,.335) forwards; }
@keyframes starFieldShrink {
  0% { transform: scale(1); opacity: 1; }
  100% { transform: scale(.05); opacity: 0; }
}

.fortune-plaque {
  position: fixed; top: 0; left: 50%; transform: translateX(-50%); z-index: 50;
  cursor: pointer; user-select: none;
  display: flex; flex-direction: column; align-items: center;
  touch-action: manipulation;
}
.fortune-string {
  width: 2px; height: 18px;
  background: linear-gradient(#c0392b,#e74c3c);
  border-radius: 1px;
}
.fortune-string-knot {
  width: 8px; height: 6px; background: #c0392b; border-radius: 2px;
  margin-bottom: -1px;
}
.fortune-wood {
  width: 28px; height: 38px;
  background: linear-gradient(135deg,#d4a96a,#c4944a,#d4a96a);
  border-radius: 4px 4px 6px 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,.2), inset 0 1px 0 rgba(255,255,255,.2);
  position: relative;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; color: #5a3a1a; font-weight: 700;
  letter-spacing: 1px;
  transition: transform .3s;
}
.fortune-wood::after {
  content: ''; position: absolute;
  top: 2px; left: 3px; right: 3px; bottom: 2px;
  border: 1px solid rgba(139,90,43,.25);
  border-radius: 2px;
  pointer-events: none;
}
.fortune-plaque.swing .fortune-wood {
  animation: plaqueSwing .6s ease-in-out;
}
@keyframes plaqueSwing {
  0% { transform: rotate(0deg); }
  20% { transform: rotate(12deg); }
  40% { transform: rotate(-8deg); }
  60% { transform: rotate(6deg); }
  80% { transform: rotate(-3deg); }
  100% { transform: rotate(0deg); }
}
.fortune-tassel {
  width: 1px; height: 10px; background: #c0392b;
  margin-top: -1px;
}
.fortune-tassel-end {
  width: 10px; height: 6px;
  background: linear-gradient(#e74c3c,#c0392b);
  border-radius: 0 0 6px 6px;
}

.fortune-modal {
  position: fixed; inset: 0; z-index: 20000;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .4s;
}
.fortune-modal.active { opacity: 1; pointer-events: auto; }
.fortune-card {
  background: linear-gradient(180deg,#fdf5e6,#f5e6d0);
  border-radius: 20px; padding: 32px 24px 24px;
  max-width: 360px; width: 90%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  border: 2px solid #d4a96a;
  position: relative;
}
.fortune-card .f-stamp {
  position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 36px; border-radius: 50%;
  background: #c0392b; color: #fdf5e6;
  font-size: 16px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid #d4a96a;
}
.fortune-card .f-number {
  font-size: 12px; color: #8b5a2b; margin-bottom: 16px;
  letter-spacing: 2px;
}
.fortune-card .f-type {
  display: inline-block; padding: 4px 14px; border-radius: 10px;
  font-size: 12px; font-weight: 600; margin-bottom: 12px;
  letter-spacing: 1px;
}
.fortune-card .f-type.good { background: #e8f5e9; color: #2e7d32; }
.fortune-card .f-type.mid { background: #fff8e1; color: #f57f17; }
.fortune-card .f-type.bad { background: #fce4ec; color: #c62828; }
.fortune-card .f-poem {
  font-size: 15px; color: #5a3a1a; line-height: 1.8;
  margin-bottom: 16px; font-family: "SimSun","STSong",serif;
  letter-spacing: 1px;
}
.fortune-card .f-meaning {
  font-size: 13px; color: #8b5a2b; line-height: 1.6;
  margin-bottom: 20px;
}
.fortune-card .f-close {
  padding: 8px 28px; border-radius: 14px; border: 1px solid #d4a96a;
  background: #fdf5e6; color: #8b5a2b; font-size: 14px;
  cursor: pointer; transition: background .2s;
  touch-action: manipulation;
}
.fortune-card .f-close:hover { background: #f5e6d0; }

.chat-overlay {
  position: fixed; inset: 0; z-index: 20000;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none;
  transition: opacity .4s;
}
.chat-overlay.active { opacity: 1; pointer-events: auto; }
.chat-panel {
  background: rgba(255,255,255,.96);
  border-radius: 24px; width: 92%; max-width: 440px; height: 78vh; max-height: 640px;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
  overflow: hidden;
}
.chat-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  background: linear-gradient(135deg,#f8e8f0,#f0e8f8);
  border-bottom: 1px solid rgba(0,0,0,.06);
  flex-shrink: 0;
}
.chat-header .ch-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg,#e8a0c0,#d0a0e0);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
}
.chat-header .ch-name { font-size: 16px; font-weight: 600; color: #333; }
.chat-header .ch-status { font-size: 12px; color: #999; }
.chat-close {
  margin-left: auto; width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(0,0,0,.08); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #666; transition: background .2s;
  touch-action: manipulation;
}
.chat-close:hover { background: rgba(0,0,0,.15); }
.chat-gear {
  width: 32px; height: 32px; border-radius: 50%;
  border: none; background: rgba(0,0,0,.08); font-size: 15px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  color: #666; transition: background .2s; margin-right: 6px;
  touch-action: manipulation;
}
.chat-gear:hover { background: rgba(0,0,0,.15); }

.api-key-modal {
  position: fixed; inset: 0; z-index: 21000;
  background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.api-key-modal.active { opacity: 1; pointer-events: auto; }
.api-key-card {
  background: #fff; border-radius: 20px; padding: 28px 24px;
  max-width: 360px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,.25);
}
.api-key-card .ak-title { font-size: 17px; font-weight: 700; color: #333; margin-bottom: 6px; }
.api-key-card .ak-desc { font-size: 13px; color: #888; margin-bottom: 18px; line-height: 1.5; }
.api-key-card .ak-input {
  width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 12px;
  font-size: 13px; outline: none; font-family: inherit; margin-bottom: 6px;
  transition: border-color .2s;
}
.api-key-card .ak-input:focus { border-color: #d0a0e0; }
.api-key-card .ak-hint { font-size: 11px; color: #aaa; margin-bottom: 16px; }
.api-key-card .ak-btns { display: flex; gap: 10px; }
.api-key-card .ak-btn {
  flex: 1; padding: 10px 0; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: background .2s;
  touch-action: manipulation;
}
.api-key-card .ak-provider { display: flex; gap: 8px; margin-bottom: 14px; }
.api-key-card .ak-provider-btn {
  flex: 1; padding: 8px 0; border-radius: 10px; border: 2px solid #e0e0e0;
  background: #fafafa; font-size: 13px; font-weight: 600; cursor: pointer;
  transition: all .2s; text-align: center;
}
.api-key-card .ak-provider-btn.active { border-color: #d0a0e0; background: #f5eaf8; color: #9b59b6; }
.api-key-card .ak-provider-btn:hover { border-color: #d0a0e0; }
.api-key-card .ak-btn-save {
  background: linear-gradient(135deg,#e8a0c0,#d0a0e0); color: #fff;
}
.api-key-card .ak-btn-clear {
  background: #f5f5f5; color: #888;
}
.api-key-card .ak-btn-clear:hover { background: #eee; }

.chat-messages {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 14px;
}
.chat-messages .msg {
  max-width: 82%; padding: 12px 16px; border-radius: 18px;
  font-size: 14px; line-height: 1.55; word-break: break-word;
}
.chat-messages .msg.ai {
  align-self: flex-start;
  background: #f5f0f5; color: #444;
  border-bottom-left-radius: 6px;
}
.chat-messages .msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg,#e8a0c0,#d0a0e0);
  color: #fff; border-bottom-right-radius: 6px;
}
.chat-messages .msg.typing {
  align-self: flex-start; background: #f0f0f0; color: #aaa;
  font-style: italic; padding: 10px 18px;
}
.chat-input-area {
  display: flex; gap: 10px; padding: 14px 16px;
  border-top: 1px solid rgba(0,0,0,.06);
  background: #fafafa; flex-shrink: 0;
}
.chat-input-area textarea {
  flex: 1; resize: none; border: 1px solid #e0e0e0; border-radius: 18px;
  padding: 10px 16px; font-size: 14px; outline: none; font-family: inherit;
  line-height: 1.4; max-height: 80px; background: #fff;
  transition: border-color .2s;
}
.chat-input-area textarea:focus { border-color: #d0a0e0; }
.chat-input-area .send-btn {
  width: 44px; height: 44px; border-radius: 50%; border: none;
  background: linear-gradient(135deg,#e8a0c0,#d0a0e0);
  color: #fff; font-size: 18px; cursor: pointer; flex-shrink: 0;
  transition: transform .2s, box-shadow .2s;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
}
.chat-input-area .send-btn:hover { transform: scale(1.08); }
.chat-input-area .send-btn:active { transform: scale(.94); }

.landing-content {
  position: relative; z-index: 2; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 40px 24px; text-align: center;
  opacity: 0; transition: opacity .5s ease-out, z-index 0s;
}
.landing-content.show { opacity: 1; }
.landing-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.15); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,.2);
  padding: 8px 18px; border-radius: 20px;
  font-size: 13px; color: rgba(255,255,255,.9); letter-spacing: 1px; margin-bottom: 36px;
}
.landing-title {
  font-size: clamp(36px,8vw,56px); font-weight: 700;
  color: rgba(255,255,255,.95); text-shadow: 0 2px 16px rgba(0,0,0,.25);
  line-height: 1.2; margin-bottom: 8px; letter-spacing: 2px;
}
.landing-title .highlight {
  background: linear-gradient(135deg,#ffd8ec,#f0c8d8,#fff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.landing-subtitle {
  font-size: clamp(15px,3vw,20px); color: rgba(255,255,255,.85);
  text-shadow: 0 1px 8px rgba(0,0,0,.2); margin-bottom: 8px;
  letter-spacing: 3px; font-weight: 300;
}
.landing-desc {
  font-size: clamp(13px,2vw,15px); color: rgba(255,255,255,.7);
  margin-bottom: 48px; font-weight: 300; letter-spacing: 1px;
}
.landing-divider {
  width: 60px; height: 2px;
  background: linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
  margin-bottom: 40px; border-radius: 2px;
}

.landing-btns { display: flex; flex-direction: column; gap: 16px; align-items: center; }
.landing-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 16px 48px; font-size: 20px; font-weight: 600;
  color: #fff;
  background: transparent; border: 1px solid transparent; border-radius: 50px; cursor: pointer;
  text-shadow: 0 1px 6px rgba(0,0,0,.5);
  transition: transform .3s, text-shadow .3s, background .3s, border-color .3s, backdrop-filter .3s;
  touch-action: manipulation; text-decoration: none; letter-spacing: 2px;
}
.landing-btn:hover {
  transform: translateY(-2px) scale(1.02);
  background: rgba(255,255,255,.1);
  border-color: rgba(255,255,255,.25);
  text-shadow: 0 2px 10px rgba(0,0,0,.6);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.landing-btn:active { transform: scale(.96); }
.landing-btn .arrow { display: inline-block; transition: transform .3s; }
.landing-btn:hover .arrow { transform: translateX(4px); }

.landing-btn-glow { position: relative; }
.landing-btn-glow::before { display: none; }

.landing-footer {
  position: absolute; bottom: 32px; left: 0; right: 0;
  text-align: center; font-size: 12px; color: rgba(255,255,255,.6);
  letter-spacing: 1px; z-index: 2;
}

@media (max-width: 420px) {
  .landing-badge { font-size: 11px; padding: 6px 14px; margin-bottom: 28px; }
  .landing-btn { padding: 14px 36px; font-size: 18px; }
  .landing-footer { bottom: 20px; font-size: 11px; }
  .landing-btns { gap: 12px; }
  .chat-panel { height: 88vh; max-height: none; border-radius: 18px 18px 0 0; }
  .fortune-plaque { top: 0; left: 50%; transform: translateX(-50%); }
  .fortune-wood { width: 34px; height: 44px; font-size: 14px; }
}

.loading-screen {
  position: fixed; inset: 0; z-index: 10000;
  background: #b8d4f0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  transition: background .6s ease-out;
}
.loading-screen.hide { background: transparent; pointer-events: none; }

.loading-orbit {
  position: relative; width: 0; height: 0;
  animation: orbitSpin 5s linear infinite;
  transition: opacity .5s ease-out;
}
.loading-screen.hide .loading-orbit { opacity: 0; }
@keyframes orbitSpin { 100% { transform: rotate(360deg); } }

.loading-star-big {
  position: absolute;
  width: 44px; height: 44px;
  margin-left: -22px; margin-top: -22px;
  background: #f5c842;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  animation: bigStarPulse 1.6s ease-in-out infinite;
  box-shadow: 0 0 24px rgba(245,200,66,.5);
}
@keyframes bigStarPulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.loading-star-small {
  position: absolute;
  width: 10px; height: 10px;
  margin-left: -5px; margin-top: -5px;
  background: #f5c842;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  animation: starContract 1.8s var(--delay) ease-in-out infinite;
  box-shadow: 0 0 10px rgba(245,200,66,.35);
}
@keyframes starContract {
  0%   { opacity: 1;   transform: translate(var(--tx), var(--ty)) rotate(0deg) scale(1); }
  100% { opacity: .12; transform: translate(0, 0) rotate(200deg) scale(.2); }
}

.loading-text {
  margin-top: 32px;
  color: rgba(60,60,80,.4); font-size: 13px;
  letter-spacing: 5px;
  animation: textFade 2.2s ease-in-out infinite;
  transition: opacity .5s ease-out;
}
.loading-screen.hide .loading-text { opacity: 0; animation: none; }
@keyframes textFade {
  0%,100% { opacity: .2; }
  50% { opacity: .55; }
}

.trail-container {
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none; overflow: hidden;
}
.trail-particle {
  position: absolute;
  width: 6px; height: 6px;
  background: #fff8c0;
  clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
  box-shadow: 0 0 10px rgba(255,248,192,.8);
  pointer-events: none;
  transform: translate(-50%,-50%);
  animation: trailFade .85s ease-out forwards;
}
@keyframes trailFade {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(.15); }
}
@media (max-width: 768px) {
  .trail-container { display: none; }
}
</style>
</head>
<body>

<div class="trail-container" id="trailContainer"></div>

<div class="loading-screen" id="loadingScreen">
  <div class="loading-orbit">
    <div class="loading-star-big"></div>
    <div class="loading-star-small" style="--tx:56px;--ty:0;--delay:0s"></div>
    <div class="loading-star-small" style="--tx:39.6px;--ty:-39.6px;--delay:.15s"></div>
    <div class="loading-star-small" style="--tx:0;--ty:-56px;--delay:.3s"></div>
    <div class="loading-star-small" style="--tx:-39.6px;--ty:-39.6px;--delay:.45s"></div>
    <div class="loading-star-small" style="--tx:-56px;--ty:0;--delay:.6s"></div>
    <div class="loading-star-small" style="--tx:-39.6px;--ty:39.6px;--delay:.75s"></div>
    <div class="loading-star-small" style="--tx:0;--ty:56px;--delay:.9s"></div>
    <div class="loading-star-small" style="--tx:39.6px;--ty:39.6px;--delay:1.05s"></div>
  </div>
  <div class="loading-text">正在进入应援小站…</div>
</div>

<div class="landing-bg" id="landingBg"></div>
<div class="landing-sparkles" id="lsContainer"></div>
<div class="petal-container" id="petalContainer"></div>


<div class="landing-content" id="landingContent">
  <div class="landing-badge">📖 鹅城一中 · 肖清雅</div>

(function initTrail(){
  var trail = document.getElementById('trailContainer');
  if (!trail) return;
  var mx = -100, my = -100;
  var lastTime = 0;
  var throttleMs = 40;

  document.addEventListener('mousemove', function(e){
    var now = Date.now();
    if (now - lastTime < throttleMs) return;
    lastTime = now;
    mx = e.clientX; my = e.clientY;
    var p = document.createElement('div');
    p.className = 'trail-particle';
    p.style.left = mx + 'px';
    p.style.top = my + 'px';
    var size = 9 + Math.random() * 10;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.animationDuration = (.6 + Math.random() * .6) + 's';
    trail.appendChild(p);
    setTimeout(function(){ if(p.parentNode) p.parentNode.removeChild(p); }, 900);
  });
})();

// 验证 API Key 格式
function validateApiKey(key, provider) {
  if (!key) return true; // 空值表示使用服务器模式，合法
  key = key.trim();
  provider = provider || getUserApiProvider();
  if (provider === 'deepseek') {
    // DeepSeek Key 格式：sk- 开头
    return /^sk-[a-zA-Z0-9]+$/.test(key);
  }
  // 智谱 Key 格式：32位十六进制.随机字符串
  return /^[a-f0-9]{32}\.[a-zA-Z0-9]+$/.test(key);
}

// 获取直连 API 配置
function getDirectApiConfig(provider) {
  provider = provider || getUserApiProvider();
  if (provider === 'deepseek') {
    return { url: DEEPSEEK_URL, model: 'deepseek-chat' };
  }
  return { url: GLM_URL, model: 'glm-4-flash' };
}

function getOfflineReply(text) {
  var t = text.toLowerCase();
  // 依次匹配关键词
  for (var i = 0; i < offlineKeywords.length; i++) {
    var kw = offlineKeywords[i];
    for (var j = 0; j < kw.words.length; j++) {
      if (t.indexOf(kw.words[j]) !== -1) {
        var pool = kw.replies;
        return pool[Math.floor(Math.random() * pool.length)];
      }
    }
  }
  // 如果消息很短（1-4个字），用更亲昵的回复
  if (t.replace(/\s/g,'').length <= 4) {
    var shortPool = ['嗯～我在呢', '嘿嘿，怎么啦', '我听着呢～', '唔？你说'];
    return shortPool[Math.floor(Math.random() * shortPool.length)];
  }
  // 如果带问号，视为提问
  if (t.indexOf('？') !== -1 || t.indexOf('?') !== -1) {
    var questionPool = [
      '嗯…让我想想哦…',
      '你这个问题好难呀（歪头想了想）',
      '唔…我觉得是你说的那样吧～',
      '哈哈，你怎么什么都问我呀'
    ];
    return questionPool[Math.floor(Math.random() * questionPool.length)] + ' ' + offlineFallbacks2[Math.floor(Math.random() * offlineFallbacks2.length)];
  }
  // 通用回复：在两个池子中轮流选择避免重复
  var r = Math.random();
  if (r < 0.55) {
    return offlineFallbacks[Math.floor(Math.random() * offlineFallbacks.length)];
  } else {
    return offlineFallbacks2[Math.floor(Math.random() * offlineFallbacks2.length)];
  }
}

function loadMemory() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    var data = JSON.parse(raw);
    if (!Array.isArray(data)) return [];
    var cutoff = Date.now()-MEMORY_DAYS*86400000;
    return data.filter(function(m){ return m.time>=cutoff; });
  } catch(e) { return []; }
}

function saveMemory() {
  var now = Date.now();
  var data = loadMemory();
  for (var i = 0; i < chatHistory.length; i++) {
    data.push({role:chatHistory[i].role,content:chatHistory[i].content,time:now});
  }
  var cutoff = now-MEMORY_DAYS*86400000;
  data = data.filter(function(m){ return m.time>=cutoff; });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e){}
}

function loadMemoryNotes() {
  try {
    var raw = localStorage.getItem(MEMORY_NOTES_KEY);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch(e) { return []; }
}

function saveMemoryNote(note) {
  if (!note) return;
  var notes = loadMemoryNotes();
  notes.push({ text: note, time: Date.now() });
  if (notes.length > MAX_MEMORY_NOTES) notes = notes.slice(-MAX_MEMORY_NOTES);
  try { localStorage.setItem(MEMORY_NOTES_KEY, JSON.stringify(notes)); } catch(e) {}
}

function buildMemoryString() {
  var notes = loadMemoryNotes();
  if (!notes.length) return '';
  var lines = [];
  for (var i = 0; i < notes.length; i++) {
    lines.push('- ' + notes[i].text);
  }
  return lines.join('\n');
}

function saveMemoryFromHistory() {
  if (chatHistory.length < 2) return;
  for (var i = 0; i < chatHistory.length; i += 2) {
    var userMsg = chatHistory[i];
    var aiMsg = chatHistory[i + 1];
    if (userMsg && userMsg.role === 'user' && aiMsg && aiMsg.role === 'assistant') {
      saveMemoryNote('对方说：' + userMsg.content + '，你回答：' + aiMsg.content);
    }
  }
}

  chatHistory = [];

function buildAIMessages(chatHist, includeMemory) {

  if (includeMemory) {
    var memory = buildMemoryString();
    if (memory) {
      systemMsg = '【关于和你聊天的人，你记得这些事】\n' + memory + '\n\n' + systemMsg;
    }
  }
  return [
    {role:'system',content:systemMsg}
  ].concat(chatHist);
}

function sendMessage() {
  var text = chatInput.value.trim();
  if (!text) return;

  // 如果正在输入，点击按钮取消请求
  if (isTyping) {
    cancelCurrentRequest();
    isTyping = false;
    chatSendBtn.textContent = '➤';
    return;
  }

  chatInput.value = '';
  chatInput.style.height = 'auto';

  addMessage('user', text);
  addTyping();
  chatHistory.push({role:'user',content:text});

  // 标记正在输入，按钮变成取消
  isTyping = true;
  chatSendBtn.textContent = '✕';

  var apiKey = getUserApiKey();
  if (apiKey) {
    callDirectAPI(apiKey);
  } else {
    callServerProxy(0);
  }
}

function callDirectAPI(apiKey) {
  var config = getDirectApiConfig();
  fetch(config.url, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer '+apiKey
    },
    body: JSON.stringify({
      model: config.model,
      messages: buildAIMessages(chatHistory, true),
      temperature: 0.9,
      max_tokens: 400
    })
  })
  .then(function(resp){ return resp.json(); })
  .then(function(data){
    var reply = data.choices&&data.choices[0]?data.choices[0].message.content:'嗯…刚才走神了，你再说一遍？';
    removeTyping();
    addMessage('ai', reply);
    chatHistory.push({role:'assistant',content:reply});
    saveMemoryNote('对方说了' + chatHistory[chatHistory.length-2].content + '，你回答说' + reply);
  })
  .catch(function(){
    removeTyping();
    addMessage('ai', '唔…用自己的 Key 好像没成功，试试服务器吧～');
    callServerProxy(0);
  });
}

function callServerProxy(retryCount) {
  retryCount = retryCount || 0;
  var abortController = new AbortController();
  currentAbortController = abortController;

  fetch((SERVER_API || '') + '/api/chat/stream', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: buildAIMessages(chatHistory),
      memory: buildMemoryString(),
      _ts: Date.now()
    }),
    signal: abortController.signal
  })
  .then(function(resp) {
    if (resp.status === 429) {
      if (retryCount < 1) {
        // 429 仅静默重试一次
        setTimeout(function() { callServerProxy(retryCount + 1); }, 2000);
        return;
      }
      // 429 重试仍失败，直接降级离线
      fallbackOffline();
      return;
    }
    if (!resp.ok) {
      // 其他错误直接降级离线
      fallbackOffline();
      return;
    }
    return resp.body.getReader();
  })
  .then(function(reader) {
    if (!reader) return; // 429 handled above
    var decoder = new TextDecoder();
    var fullReply = '';
    var aiMsgDiv = null;

    function readChunk() {
      return reader.read().then(function(result) {
        if (result.done) {
          // 流结束
          if (fullReply) {
            chatHistory.push({ role: 'assistant', content: fullReply });
            saveMemoryNote('对方说了' + chatHistory[chatHistory.length - 2].content + '，你回答说' + fullReply);
          }
          removeTyping();
          currentAbortController = null;
          isTyping = false;
          chatSendBtn.textContent = '➤';
          return;
        }

        var chunk = decoder.decode(result.value, { stream: true });
        var lines = chunk.split('\n');

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i].trim();
          if (line.indexOf('data:') === 0) {
            var data = line.substring(5).trim();
            if (data === '[DONE]') {
              // 完成
              if (fullReply) {
                chatHistory.push({ role: 'assistant', content: fullReply });
                saveMemoryNote('对方说了' + chatHistory[chatHistory.length - 2].content + '，你回答说' + fullReply);
              }
              removeTyping();
              currentAbortController = null;
              isTyping = false;
              chatSendBtn.textContent = '➤';
              return;
            }
            try {
              var json = JSON.parse(data);
              if (json.error) {
                removeTyping();
                fallbackOffline();
                return;
              }
              if (json.content) {
                fullReply += json.content;
                // 更新显示
                removeTyping();
                if (!aiMsgDiv) {
                  aiMsgDiv = document.createElement('div');
                  aiMsgDiv.className = 'msg ai streaming';
                  chatMessages.appendChild(aiMsgDiv);
                }
                aiMsgDiv.textContent = fullReply;
                chatMessages.scrollTop = chatMessages.scrollHeight;
              }
            } catch (e) {
              // 解析失败，跳过
            }
          }
        }

        return readChunk();
      });
    }

    return readChunk();
  })
  .catch(function(err) {
    if (err.name === 'AbortError') {
      // 用户主动取消，不添加消息
      removeTyping();
      isTyping = false;
      chatSendBtn.textContent = '➤';
      return;
    }
    // 其他错误直接降级离线
    fallbackOffline();
  });
}

// 取消当前请求
function cancelCurrentRequest() {
  if (currentAbortController) {
    currentAbortController.abort();
    currentAbortController = null;
  }
}

function fallbackOffline() {
  var delay = 400 + Math.random() * 800;
  setTimeout(function(){
    removeTyping();
    var reply = getOfflineReply(chatHistory[chatHistory.length-1].content);
    addMessage('ai', reply);
    chatHistory.push({role:'assistant',content:reply});
    isTyping = false;
    chatSendBtn.textContent = '➤';
  }, delay);
}

(function preloadResources(){
  var loadingScreen = document.getElementById('loadingScreen');
  var landingContent = document.getElementById('landingContent');
  var minWait = 1600;
  var start = Date.now();

  var urls = [
    'zhuye.png','fuzhan.png','bizhi.png','touxiang.jpg',
    'beijingmusic.mp3','station.html','counsel.html'
  ];

  var tasks = urls.map(function(url){
    if (/\.(png|jpg|jpeg|gif|webp)$/i.test(url)) {
      return new Promise(function(resolve){
        var img = new Image();
        img.onload = resolve;
        img.onerror = resolve;
        img.src = url;
      });
    }
    return fetch(url,{cache:'force-cache'}).catch(function(){});
  });

  Promise.all(tasks).then(function(){
    var remain = Math.max(0, minWait - (Date.now() - start));
    setTimeout(function(){
      landingContent.classList.add('show');

      setTimeout(function(){
        loadingScreen.classList.add('hide');
        setTimeout(function(){
          if(loadingScreen.parentNode) loadingScreen.parentNode.removeChild(loadingScreen);
        },650);
      }, 700);
    }, remain);
  });
})();
