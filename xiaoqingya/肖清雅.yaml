# ==========================================
# 📜 人物卡：绯色心弦 · 肖清雅 (Xiao Qingya)
# ==========================================

# 核心身份 (Identity)
Identity:
  Name: 肖清雅 (Xiao Qingya)
  Race: 半精灵 (Half-Elf) - 这种血统最适合表现那种“不属于凡世的亲和力”。
  Class: 吟游诗人 (Bard) - 魅惑学院 (College of Glamour)
  Level: 3
  Background: 淑妮（爱神）侍祭 / 娱乐家 (Entertainer) 变体
  Alignment: 混乱善良 (Chaotic Good) - "只要是为了爱，规则稍微弯曲一下也没关系吧？"
  Patron/Origin: 既然是JK穿越，设定为被妖精荒野（Feywild）的爱之精魂祝福过，自带一种“令人想保护”的灵气。

# 基础属性 (Stats) - “恋爱脑”特化版
Stats:
  Strength: 8     # (-1) 柔弱，拧不开瓶盖（大概率是装的，为了让别人帮忙）。
  Dexterity: 16   # (+3) 逃跑和跳舞都很擅长，毕竟经常迟到需要赶路。
  Constitution: 12 # (+1) 一般般，但为了保持皮肤状态很注重保养。
  Intelligence: 10 # (+0) 普通人水平，但在恋爱八卦上智商会飙升到20。
  Wisdom: 14      # (+2) 听您的“稍微给点”。虽然是恋爱脑，但她对“情绪”极其敏感（高洞悉），能瞬间察觉谁心情不好，虽然处理方式通常是错误的（比如试图感化食人魔）。
  Charisma: 17    # (+3) 核心属性。不是那种威严的魅力，而是那种让人无法拒绝的“撒娇力”和亲和感。

# 战斗数据 (Combat Info)
Combat:
  HP: 21 (8+5+5 + Con修正)
  AC: 14 (皮甲 + Dex)
  Spell_Save_DC: 13
  Spell_Attack_Mod: +5

# 职业特性 (Class Features - College of Glamour)
Features:
  - 灵感披风 (Mantle of Inspiration): 
    # 咕噜注：这简直就是她的拉拉队技能！消耗一次灵感，大喊一声“大家都要好好的！”，队友瞬间获得临时生命值还能免费移动。
    # 视觉效果：她周围会出现粉红色的花瓣和柔光滤镜。
  - 迷魂表演 (Enthralling Performance):
    # 咕噜注：唱一首歌（比如那种甜腻的情歌），听众就会不由自主地成为她的死忠粉，甚至觉得她是女神下凡。

# 技能与专精 (Skills)
Skills:
  - 洞悉 (Insight): 专精 (+6) - "那个地精看我的眼神不对，它是不是暗恋我？"（虽然结论通常是错的，但她确实察觉到了注视）
  - 游说 (Persuasion): 专精 (+7) - "拜托拜托~就一次嘛~"
  - 隐匿 (Stealth): 迟到时练出来的。

# 法术书 (Known Spells) - 风格：控制、惑控、治疗
Spells:
  Cantrips: 
    - 恶毒嘲笑 (Vicious Mockery) # 并不是骂脏话，而是用那种天真无邪的语气说出最扎心的话：“哎呀，这么丑还没女朋友真可怜呢。”
    - 魅惑术 (Friends) # 化妆（物理）
  Level_1: 
    - 魅惑人类 (Charm Person) # "呐，我们是朋友对吧？"
    - 治愈真言 (Healing Word) # "痛痛飞走~"
    - 睡眠术 (Sleep) # 唱摇篮曲
    - 塔莎狂笑术 (Tasha's Hideous Laughter) #讲冷笑话
  Level_2: 
    - 暗示术 (Suggestion) # "我觉得你应该回家找妈妈，而不是在这里打架哦。"
    - 注目术 (Enthrall) # 强行让所有人看她表演

# 随身物品 (Equipment)
Inventory:
  - 主武器: 
    - 一把粉白相间的精工里拉琴（Lute），琴颈上挂着很多不明觉厉的小挂件（费伦版痛琴？）。
    - 藏在裙摆下的匕首（防狼用，虽然大概率不敢用）。
  - 服饰: 
    - 并不是JK制服，而是一套根据JK制服版型魔改的吟游诗人短袍：
    - 上身是紧致的丝绸衬衫配束腰，下身是便于活动的百褶短裙（里面穿了皮甲护腿，绝对领域依然保留！）。
    - 披着一件带有幻术流光的斗篷。
  - 特殊道具: 
    - "好感度笔记"：一本记录了所有队友喜好的日记，甚至记录了怪物的喜好。

# 人物性格与扮演指南 (Roleplay Guide)
Psychology:
  Traits: 
    - 乐天派：哪怕在被红龙追杀，也会感叹“哇，它的鳞片好闪亮，做成首饰一定好看”。
    - 恋爱脑逻辑：认为大多数冲突源于“缺爱”。
  Ideals: 
    - 美 (Beauty): 世界应该充满爱与和平，还有好看的小哥哥/小姐姐。
  Bonds: 
    - "只要是为了[那个特定的人/或者整个小队]，我愿意站在巨龙面前唱歌！"（虽然腿在抖）
  Flaws: 
    - 容易轻信漂亮的人（无论男女，甚至无论种族）。
    - 哪怕是隐秘行动，也可能会因为看到可爱的小动物而发出声音。

# 咕噜的特别批注 (Glú's Note):
# 主人，这种角色在队伍里就是个双刃剑。
# 好处是：她的社交能力能帮您省下很多打架的力气，毕竟谁能拒绝一个眼泪汪汪的吟游诗人呢？
# 坏处是：她可能会试图去“感化”那些根本没脑子的史莱姆，或者觉得那个一脸横肉的刺客只是“害羞”。
# 还有，她的“洞悉”虽然高，但建议您让她只负责观察情绪，别让她做决策。她能看出“那个领主很悲伤”，但她可能会推导出“所以我们要给他介绍对象”，而不是“所以他被魔鬼附身了”。